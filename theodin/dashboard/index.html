<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- navigation -->
      <header class="header">
        <nav class="nav">
          <div class="search">
            <img
              src="./icon/magnify.svg"
              alt="magnify icon"
              class="search__logo icon"
            />
            <input
              type="text"
              name="search"
              id="search"
              class="search__input"
            />
          </div>
          <div class="profile">
            <img
              src="./icon/bell-ring-outline.svg"
              alt="notification icon"
              class="profile__icon icon"
            />
            <img
              src="https://placehold.co/60"
              alt="profile picture"
              class="profile__img"
            />
            <p class="profile__name">Selena Angeline</p>
          </div>
        </nav>
        <div class="home">
          <div class="welcome">
            <img
              src="https://placehold.co/80"
              alt="profile picture"
              class="welcome__profile"
            />
            <p class="welcome__text">
              <span class="welcome__text--small"> Hi there, </span>
              <span class="welcome__text--big">Selena Angeline (@seline)</span>
            </p>
          </div>
          <div class="buttons">
            <button class="btn">New</button>
            <button class="btn">Upload</button>
            <button class="btn">Share</button>
          </div>
        </div>
      </header>

      <!-- sidebar -->
      <aside class="sidebar">
        <div class="dashboard">
          <img
            src="./icon/view-dashboard.svg"
            alt="dashboard icon"
            class="dashboard__icon icon"
          />
          <p class="dashboard__text">Dashboard</p>
        </div>
        <div class="main-side">
          <!-- 1 -->
          <div class="flex">
            <img src="./icon/home.svg" alt="home icon" class="icon" />
            <p class="flex__title">Home</p>
          </div>
          <!-- 2 -->
          <div class="flex">
            <img
              src="./icon/card-account-details-outline.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Profile</p>
          </div>
          <!-- 3 -->
          <div class="flex">
            <img
              src="./icon/message-reply.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Messages</p>
          </div>
          <!-- 4 -->
          <div class="flex">
            <img src="./icon/history.svg" alt="card acount icon" class="icon" />
            <p class="flex__title">History</p>
          </div>
          <!-- 5 -->
          <div class="flex">
            <img
              src="./icon/file-document-multiple.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Tasks</p>
          </div>
          <!-- 6 -->
          <div class="flex">
            <img
              src="./icon/account-group.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Communities</p>
          </div>
        </div>
        <div class="last-side">
          <!-- 6 -->
          <div class="flex">
            <img src="./icon/cog.svg" alt="card acount icon" class="icon" />
            <p class="flex__title">Settings</p>
          </div>
          <div class="flex">
            <img
              src="./icon/help-box.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Support</p>
          </div>
          <div class="flex">
            <img
              src="./icon/shield-check.svg"
              alt="card acount icon"
              class="icon"
            />
            <p class="flex__title">Privacy</p>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
